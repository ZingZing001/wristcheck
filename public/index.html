<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WristCheck approvals</title>
    <style>
      body { color: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; }
      main { max-width: 860px; margin: auto; }
      article { border: 1px solid #d1d5db; border-radius: 14px; margin: 1rem 0; padding: 1rem; }
      pre { background: #111827; border-radius: 10px; color: #f9fafb; max-height: 20rem; overflow: auto; padding: 1rem; white-space: pre-wrap; }
      button { border: 0; border-radius: 999px; color: white; cursor: pointer; font-weight: 700; margin-right: .5rem; padding: .7rem 1rem; }
      .approve { background: #047857; }
      .deny { background: #b91c1c; }
      .status { color: #4b5563; font-size: .9rem; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <main>
      <h1>WristCheck approvals</h1>
      <p>Browser fallback for approving AI steps. Apple Watch clients use the same local API.</p>
      <section id="requests">Loading...</section>
    </main>
    <script>
      const container = document.querySelector('#requests');

      async function decide(id, decision) {
        await fetch(`/api/requests/${id}/decision`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ decision, actor: 'browser', watchType: 'web' })
        });
        await load();
      }

      async function load() {
        const requests = await fetch('/api/requests').then((response) => response.json());
        if (requests.length === 0) {
          container.textContent = 'No approval requests yet.';
          return;
        }

        container.innerHTML = requests.map((request) => `
          <article>
            <div class="status">${request.status} from ${request.source}</div>
            <h2>${escapeHtml(request.title)}</h2>
            <p>${escapeHtml(request.summary)}</p>
            <pre>${escapeHtml(request.preview || '(no preview provided)')}</pre>
            ${request.status === 'pending' ? `
              <button class="approve" onclick="decide('${request.id}', 'approved')">Approve</button>
              <button class="deny" onclick="decide('${request.id}', 'denied')">Deny</button>
            ` : ''}
          </article>
        `).join('');
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      setInterval(load, 2000);
      load();
    </script>
  </body>
</html>
